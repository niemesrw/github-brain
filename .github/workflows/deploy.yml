name: deploy

on:
  push:
    branches: [main]
    paths:
      - cdk/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # OIDC → management account → chain to AI account
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::982682372189:role/GitHubActionsRole
          aws-region: us-east-1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::057122451218:role/GitHubDeployRole
          aws-region: us-east-1
          role-chaining: true

      - name: cdk deploy
        working-directory: cdk
        env:
          GH_APP_ID: ${{ vars.GH_APP_ID }}
          GH_INSTALLATION_ID_OPENBRAIN: ${{ vars.GH_INSTALLATION_ID_OPENBRAIN }}
          AGENT_ID: ${{ vars.AGENT_ID }}
          ENVIRONMENT_ID: ${{ vars.ENVIRONMENT_ID }}
        run: npx cdk deploy --all --require-approval never
